name: Regenerate ECB Seed Data

on:
  schedule:
    - cron: '0 6 1 * *'  # 6am UTC on the 1st of every month
  workflow_dispatch:        # Allow manual trigger

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Record current rate count
        id: before
        run: echo "rates=$(grep -o 'totalRates=[0-9]*' src/main/resources/db/migration/V2__seed_exchange_rates.sql | grep -o '[0-9]*')" >> $GITHUB_OUTPUT

      - name: Regenerate seed data
        run: ./gradlew test --tests "*.SeedDataGenerator" -Dgenerate.seed=true

      - name: Commit if new rates were added
        run: |
          NEW=$(grep -o 'totalRates=[0-9]*' src/main/resources/db/migration/V2__seed_exchange_rates.sql | grep -o '[0-9]*')
          OLD=${{ steps.before.outputs.rates }}
          echo "Before: $OLD rates, After: $NEW rates"
          if [ "$NEW" -gt "$OLD" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/main/resources/db/migration/V2__seed_exchange_rates.sql
            git commit -m "chore: regenerate ECB exchange rate seed data"
            git push
          elif [ "$NEW" -lt "$OLD" ]; then
            echo "Rate count decreased from $OLD to $NEW — aborting to avoid committing incomplete data."
            exit 1
          else
            echo "No new rates — skipping commit."
          fi
